---
server:
  address: 'tcp://0.0.0.0:9091'
  endpoints:
    authz:
      forward-auth:
        implementation: 'ForwardAuth'

log:
  level: 'info'
  format: 'text'

# Default theme
theme: 'dark'

# Authentication backend
authentication_backend:
  file:
    path: '/config/users_database.yml'
  password_reset:
    disable: false

# Password policy
password_policy:
  standard:
    enabled: true
    min_length: 12
    require_uppercase: true
    require_lowercase: true
    require_number: true
    require_special: false

# Access control rules
access_control:
  default_policy: 'deny'

  rules:
    # Allow all authenticated users to access services
    - domain:
        - 'minecraft.yourdomain.com'
        - 'homarr.yourdomain.com'
        - 'grafana.yourdomain.com'
        - 'affine.yourdomain.com'
      policy: 'one_factor'  # Username + password

    # Require 2FA for admin services
    - domain:
        - 'prometheus.yourdomain.com'
      policy: 'two_factor'  # Username + password + TOTP

# Session configuration
session:
  secret: '${AUTHELIA_SESSION_SECRET}'
  name: 'authelia_session'
  domain: 'yourdomain.com'
  expiration: '1h'
  inactivity: '5m'
  cookies:
    - domain: 'yourdomain.com'
      authelia_url: 'auth.yourdomain.com'
      default_redirection_url: 'https://homarr.yourdomain.com'

# Storage (encrypted SQLite)
storage:
  encryption_key: '${AUTHELIA_STORAGE_ENCRYPTION_KEY}'
  local:
    path: '/config/db.sqlite3'

# Notification (file-based for now, can add SMTP later)
notifier:
  filesystem:
    filename: '/config/notification.txt'

# TOTP (Google Authenticator, Authy, etc.)
totp:
  issuer: 'yourdomain.com'
  period: 30
  skew: 1

# OpenID Connect Provider (for SSO with services like Homarr)
identity_providers:
  oidc:
    hmac_secret: '${AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET}'
    jwks:
      - key_id: 'main'
        algorithm: 'RS256'
        key: |
          ${AUTHELIA_IDENTITY_PROVIDERS_OIDC_ISSUER_PRIVATE_KEY}

    clients:
      - client_id: 'homarr'
        client_name: 'Homarr Dashboard'
        client_secret: '${AUTHELIA_IDENTITY_PROVIDERS_OIDC_CLIENTS_0_CLIENT_SECRET}'
        public: false
        authorization_policy: 'one_factor'
        require_pkce: false
        redirect_uris:
          - 'https://homarr.yourdomain.com/api/auth/callback/oidc'
          - 'http://localhost:7575/api/auth/callback/oidc'
        scopes:
          - 'openid'
          - 'profile'
          - 'groups'
          - 'email'
        response_types:
          - 'code'
        grant_types:
          - 'authorization_code'
        token_endpoint_auth_method: 'client_secret_basic'

      - client_id: 'grafana'
        client_name: 'Grafana'
        client_secret: '${AUTHELIA_IDENTITY_PROVIDERS_OIDC_CLIENTS_1_CLIENT_SECRET}'
        public: false
        authorization_policy: 'one_factor'
        require_pkce: false
        redirect_uris:
          - 'https://grafana.yourdomain.com/login/generic_oauth'
        scopes:
          - 'openid'
          - 'profile'
          - 'groups'
          - 'email'
        response_types:
          - 'code'
        grant_types:
          - 'authorization_code'
        token_endpoint_auth_method: 'client_secret_post'
        userinfo_signed_response_alg: 'none'
